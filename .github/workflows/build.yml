name: Build & Sign & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore app/keystore.jks \
            -alias codearm \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 'Codearm@2025' \
            -keypass 'Codearm@2025' \
            -dname 'CN=CodeArm, OU=Dev, O=CodeArm, L=Cairo, S=Cairo, C=EG'
          echo "Keystore generated successfully"

      - name: Build Release APK
        env:
          KEYSTORE_PASS: 'Codearm@2025'
          KEYSTORE_ALIAS: 'codearm'
        run: gradle assembleRelease

      - name: Verify APK Signature
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK: $APK"
          ls -lh "$APK"
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner verify --verbose "$APK" || echo "apksigner not available, skipping"
          echo "APK ready"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "الذراع البرمجي v${{ github.run_number }}"
          body: |
            ## APK موقّع بالكامل
            - بُني تلقائياً بالذكاء الاصطناعي (Gemini 2.5 Pro)
            - توقيع رقمي حقيقي V2/V3
            - Kotlin + Jetpack Compose + Material3
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: 🔨 Build & Sign APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔑 Generate Keystore (توليد مفتاح التوقيع)
        run: |
          keytool -genkey -v \
            -keystore app/keystore.jks \
            -alias codearm \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "Codearm@2025" \
            -keypass "Codearm@2025" \
            -dname "CN=الذراع البرمجي, OU=Dev, O=CodeArm, L=Cairo, S=Cairo, C=EG"
          echo "✅ Keystore generated successfully"

      - name: 🛠️ Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 📦 Grant execute permission for gradlew
        run: chmod +x gradlew 2>/dev/null || true

      - name: 🔨 Build Release APK
        env:
          KEYSTORE_PASS: "Codearm@2025"
          KEYSTORE_ALIAS: "codearm"
        run: |
          gradle assembleRelease \
            -PKEYSTORE_PASS="Codearm@2025" \
            -PKEYSTORE_ALIAS="codearm"

      - name: ✅ Verify APK signature
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK: $APK_PATH"
          jarsigner -verify -verbose -certs "$APK_PATH" | grep -E "(smk|jar verified|NOT)"
          echo "✅ APK signed and verified!"

      - name: 📤 Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: الذراع-البرمجي-signed-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: 📊 APK Info
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "📦 APK Size: $SIZE"
          echo "📍 Path: $APK_PATH"
